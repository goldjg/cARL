# GoReleaser configuration for the cARL CLI.
# https://goreleaser.com/customization/
#
# Requires GoReleaser v2 (goreleaser/goreleaser-action@v6 or later).
# Run locally:
#   goreleaser check              — validate this config
#   goreleaser release --snapshot --skip=publish  — dry-run without publishing

version: 2

project_name: carl

before:
  hooks:
    # go mod verify confirms the module cache matches go.sum without mutating
    # the working tree. go mod tidy is intentionally omitted here: run it
    # locally before tagging so the release build stays deterministic.
    - go mod verify

builds:
  # Build ID "carl" covers Linux and Windows only. darwin binaries are built,
  # codesigned, and notarised separately in the sign-darwin CI job (see
  # .github/workflows/release.yml) before GoReleaser runs. The darwin prebuilt
  # entry below picks them up so they can be archived and checksummed correctly.
  - id: carl
    main: ./cmd/carl
    binary: carl
    env:
      # Static binaries: no CGO. Matches the existing hand-rolled workflow.
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows arm64 is not a supported target.
      - goos: windows
        goarch: arm64
    ldflags:
      # Inject build-time metadata. Corresponds to vars in cmd/carl/main.go:
      #   var cliVersion  = "dev"
      #   var sourceCommit = "dev"
      - -s -w
      - -X main.cliVersion={{.Version}}
      - -X main.sourceCommit={{.FullCommit}}

  # darwin binaries are codesigned (Developer ID Application, hardened runtime)
  # and notarised in the sign-darwin CI job before GoReleaser runs. GoReleaser
  # uses the prebuilt builder to pick up the signed binaries from ./prebuilt/
  # so archives, checksums, and Homebrew cask all reference the signed artefacts.
  #
  # IMPORTANT: The prebuilt path template must exactly match the directory layout
  # produced by the sign-darwin job in .github/workflows/release.yml. If the
  # sign-darwin job changes its output paths, update this template accordingly,
  # and vice versa. The sign-darwin job uploads binaries at:
  #   prebuilt/darwin_amd64/carl  and  prebuilt/darwin_arm64/carl
  - id: darwin
    builder: prebuilt
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    prebuilt:
      path: ./prebuilt/{{ .Os }}_{{ .Arch }}/{{ .Binary }}

archives:
  - id: default
    # Naming: carl_1.2.3_linux_amd64.tar.gz / carl_1.2.3_windows_amd64.zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: goldjg
    name: cARL
  # draft: false — release is published immediately on tag push.
  draft: false
  # prerelease: auto — versions such as v1.0.0-rc.1 are marked pre-release.
  prerelease: auto
  make_latest: true

# nfpm generates native Linux packages (deb, rpm, apk) attached to the
# GitHub Release as additional artefacts. See DISTRIBUTION.md for install
# instructions and enterprise mirroring guidance.
nfpms:
  - id: packages
    package_name: carl
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # ids replaces the deprecated `builds` field: references the build ID to
    # select which binary is packaged.
    ids:
      - carl
    vendor: goldjg
    homepage: https://github.com/goldjg/cARL
    maintainer: Graham Gold <noreply@github.com>
    description: |-
      cARL — Cognitive Agent Runtime Layer.
      Version-controlled governance and instruction layer for AI coding agents.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: LICENSE
        dst: /usr/share/doc/carl/LICENSE
        type: doc

# homebrew_casks documents the intended Homebrew tap configuration for cARL.
#
# GoReleaser v2 replaced the `brews` (Formula) publisher with `homebrew_casks`.
# For CLI binaries, the `binaries` field installs the binary into the PATH;
# users would install via:
#   brew tap goldjg/carl && brew install --cask carl
#
# Publishing is currently DISABLED (skip_upload: true).
#
# Background: `skip_upload: auto` proved unsafe — GoReleaser still attempted to
# contact goldjg/homebrew-carl when HOMEBREW_TAP_GITHUB_TOKEN was present but
# invalid, causing a 401 failure that aborted the release after assets had
# already been uploaded. Setting skip_upload: true makes the pipeline
# deterministic: no tap access is attempted regardless of token state.
#
# To re-enable Homebrew publishing in a future PR:
#   1. Create a repository named `homebrew-carl` under the goldjg organisation.
#   2. Add a repository secret HOMEBREW_TAP_GITHUB_TOKEN with a token that has
#      write access to homebrew-carl.
#   3. Pass the token via the GoReleaser action env (see release.yml).
#   4. Change skip_upload from true to auto (or remove it entirely).
#
# See DISTRIBUTION.md for full Homebrew setup instructions.
homebrew_casks:
  - name: carl
    repository:
      owner: goldjg
      name: homebrew-carl
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    # skip_upload: true — Homebrew tap publishing is disabled until the tap
    # repository exists and a valid token is configured. Do not change this to
    # "auto" without also ensuring HOMEBREW_TAP_GITHUB_TOKEN is valid; "auto"
    # still contacts the tap repo when the env var is set (even if empty/invalid).
    homepage: https://github.com/goldjg/cARL
    description: "cARL — Cognitive Agent Runtime Layer for AI coding agents"
    binaries:
      - carl

# WinGet publishing is not configured here.
# GoReleaser OSS does not include a WinGet publisher.
# To submit a WinGet manifest after a release, see DISTRIBUTION.md.
