# Release workflow - builds and publishes cARL CLI binaries, archives, and
# native packages (deb/rpm/apk) using GoReleaser when a semantic version tag
# (v*) is pushed.
#
# Permissions:
#   contents: write - required to create GitHub Releases and upload assets.
#
# Secrets:
#   GITHUB_TOKEN - automatically provided; used for the release.
#   WINGETCREATE_TOKEN - optional; when set, used to submit/update the
#   `goldjg.cARL` package in microsoft/winget-pkgs.
#
# Apple signing secrets (both required for macOS artefacts to be signed):
#   MACOS_CERTIFICATE_P12_BASE64 - base64-encoded Developer ID Application .p12
#     exported from your Apple Developer keychain. Encode with:
#     base64 -i cert.p12 | tr -d '\n'
#   MACOS_CERTIFICATE_PASSWORD - password used when exporting the .p12 file.
#
# Notarisation is NOT included in the current release flow.
# GoReleaser OSS notarize.macos only supports App Store Connect API key
# authentication (issuer_id + key_id + key). The current secrets use the
# apple-id + app-specific-password model, which notarize.macos does not support.
# To add full notarisation, switch to App Store Connect API key auth and
# configure notarize.macos in .goreleaser.yaml. See DISTRIBUTION.md for details.
#
# Design:
#   The release job runs on macos-latest so that codesign is available for
#   darwin binary signing. GoReleaser cross-compiles Linux and Windows binaries
#   on the same macOS runner (Go cross-compilation does not require the target OS).
#   darwin binaries are signed inline by a GoReleaser post-hook
#   (.github/scripts/codesign-darwin.sh) immediately after each darwin binary is
#   built, before archiving. GoReleaser then runs a single `goreleaser release
#   --clean` which builds, signs (via hook), archives, computes checksums, and
#   publishes the GitHub Release in one step.
#
# Homebrew tap publishing remains configured in GoReleaser and is gated by
# HOMEBREW_TAP_GITHUB_TOKEN.
# See DISTRIBUTION.md for Homebrew, WinGet, and enterprise mirroring setup.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  release:
    name: GoReleaser
    # macOS runner required for codesign (darwin binary signing).
    # Go cross-compilation handles Linux and Windows builds on the same runner.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for GoReleaser changelog generation.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check required Apple signing secrets
        env:
          CERT_P12:  ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASS: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          missing=""
          [ -z "$CERT_P12" ]  && missing="$missing MACOS_CERTIFICATE_P12_BASE64"
          [ -z "$CERT_PASS" ] && missing="$missing MACOS_CERTIFICATE_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Required Apple signing secrets are not configured:$missing"
            echo "See DISTRIBUTION.md for setup instructions."
            exit 1
          fi
          echo "All required Apple signing secrets are present."

      - name: Import Developer ID Application certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD:   ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          # Decode the P12 into a temp file; remove it immediately after import.
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          # Generate a random keychain password (never printed or stored long-term).
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"

          # Persist path for subsequent steps; password is kept in environment only.
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate. -P passes the export password; GitHub Actions
          # automatically masks the secret value in workflow logs.
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          # Allow codesign to access the key without a GUI prompt.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Make the keychain searchable by codesign.
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Remove the decoded P12 immediately - the cert is now in the keychain.
          rm -f "$RUNNER_TEMP/cert.p12"

          # Extract the signing identity name for use in the GoReleaser post-hook.
          # `security find-identity` formats each line as: N) <SHA1> "<name>"
          # The sed pattern extracts the quoted name from that standard format.
          # Only one certificate exists in the temporary keychain, so head -1 is safe.
          SIGNING_IDENTITY=$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | sed -n '1s/.*"\([^"]*\)".*/\1/p'
          )
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::No Developer ID Application certificate found in keychain."
            echo "Verify MACOS_CERTIFICATE_P12_BASE64 contains a valid Developer ID Application certificate."
            exit 1
          fi
          # SIGNING_IDENTITY is not a secret; it is the certificate display name.
          # It is passed to the GoReleaser process so the codesign post-hook can use it.
          echo "SIGNING_IDENTITY=${SIGNING_IDENTITY}" >> "$GITHUB_ENV"
          echo "Signing identity: $SIGNING_IDENTITY"

      - name: Run GoReleaser
        # Build and archive all platforms, sign darwin binaries inline via the
        # codesign post-hook, and publish the GitHub Release and Homebrew cask
        # in a single step. goreleaser/goreleaser-action is a third-party action.
        # The action tag (@v6) is pinned to the GoReleaser v2 major line.
        # The GoReleaser tool version below is pinned to a specific release for
        # determinism. Update both pins together when upgrading GoReleaser.
        # Follow-up: pin the action itself to a commit SHA for supply-chain safety.
        # See: https://github.com/goreleaser/goreleaser-action/releases
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # SIGNING_IDENTITY is set above and inherited by the GoReleaser process.
          # The codesign post-hook reads it to identify the Developer ID cert.
          SIGNING_IDENTITY: ${{ env.SIGNING_IDENTITY }}

      - name: Delete temporary keychain
        # Always run so the keychain is removed even when earlier steps fail.
        if: always()
        run: |
          # Guard against KEYCHAIN_PATH being unset (e.g., if the job failed
          # before the certificate import step could write to GITHUB_ENV).
          # Also validate it is within RUNNER_TEMP as defense-in-depth.
          if [ -z "$KEYCHAIN_PATH" ]; then
            echo "KEYCHAIN_PATH not set; keychain was never created."
          elif [[ "$KEYCHAIN_PATH" != "$RUNNER_TEMP"/* ]]; then
            echo "::warning::KEYCHAIN_PATH is outside RUNNER_TEMP; skipping deletion for safety."
          elif security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null; then
            echo "Temporary keychain deleted."
          else
            # Non-zero exit means the keychain does not exist (e.g., the job
            # failed before keychain creation). This is expected and not an error.
            echo "Keychain deletion skipped (not created or already absent)."
          fi
          # Belt-and-suspenders: remove cert file if it was not already deleted.
          rm -f "$RUNNER_TEMP/cert.p12"

  winget:
    name: WinGet publish
    runs-on: windows-latest
    needs:
      - release
    env:
      WINGETCREATE_TOKEN: ${{ secrets.WINGETCREATE_TOKEN }}
    steps:
      - name: Skip when WinGet token is not configured
        if: ${{ env.WINGETCREATE_TOKEN == '' }}
        shell: pwsh
        run: Write-Host "WINGETCREATE_TOKEN is not configured; skipping WinGet publish."

      - name: Submit WinGet manifest PR
        if: ${{ env.WINGETCREATE_TOKEN != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ($env:GITHUB_REF_NAME -notmatch '^v[0-9]+\\.[0-9]+\\.[0-9]+(-[0-9A-Za-z.-]+)?(\\+[0-9A-Za-z.-]+)?$') {
            throw "Invalid tag format '$env:GITHUB_REF_NAME'. Expected semantic version tag starting with 'v'."
          }

          if ($env:GITHUB_REPOSITORY -notmatch '^[A-Za-z0-9_][A-Za-z0-9_.-]*/[A-Za-z0-9_][A-Za-z0-9_.-]*$') {
            throw "Invalid repository format '$env:GITHUB_REPOSITORY'."
          }

          Write-Host "Installing wingetcreate..." -ForegroundColor Green

          # Install Appx tooling via Windows PowerShell compatibility.
          Import-Module Appx -UseWindowsPowerShell -ErrorAction Stop

          # Reference uses Microsoft's official wingetcreate bootstrap URL.
          # We accept the "latest" feed to follow upstream guidance; signature
          # verification below is the integrity control for this bootstrap path.
          $bundlePath = Join-Path -Path $env:TEMP -ChildPath "wingetcreate.msixbundle"
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest/msixbundle" -OutFile $bundlePath -ErrorAction Stop

          $signature = Get-AuthenticodeSignature -FilePath $bundlePath
          if ($signature.Status -ne 'Valid') {
            throw "wingetcreate bundle signature validation failed: $($signature.Status)"
          }

          Add-AppxPackage -Path $bundlePath -ErrorAction Stop

          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/carl_${version}_windows_amd64.zip|x64"

          # wingetcreate requires --token; GitHub masks secret values in logs.
          Write-Host "Submitting WinGet PR for goldjg.cARL $version..." -ForegroundColor Green
          wingetcreate update goldjg.cARL --version $version --token $env:WINGETCREATE_TOKEN --submit --urls $url
