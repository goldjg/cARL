# GoReleaser check and snapshot workflow.
#
# Validates the .goreleaser.yaml configuration on every push and pull request
# that touches release-related files.
#
# A manual workflow_dispatch trigger supports a full snapshot dry-run:
# builds all platforms and generates all artefacts without publishing.
#
# This workflow requires no secrets.

name: GoReleaser Check

on:
  push:
    branches:
      - main
    paths:
      - '.goreleaser.yaml'
      - '.github/workflows/release.yml'
      - '.github/workflows/goreleaser-check.yml'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - '.goreleaser.yaml'
      - '.github/workflows/release.yml'
      - '.github/workflows/goreleaser-check.yml'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Run a full snapshot build (builds artefacts, does not publish)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check:
    name: Validate GoReleaser config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check GoReleaser config
        # goreleaser/goreleaser-action is a third-party action.
        # Pin action to full commit SHA.
        # v7.2.3: https://github.com/goreleaser/goreleaser-action/releases/tag/v7.2.3
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94
        with:
          version: v2.17.0
          args: check

  snapshot:
    name: Snapshot build (dry-run)
    runs-on: ubuntu-latest
    # Only run snapshot when explicitly requested via workflow_dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot == true }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: GoReleaser snapshot build
        # Keep version pin in sync with the check job above.
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94
        with:
          version: v2.17.0
          # --snapshot: build without requiring a git tag.
          # --skip=publish: do not upload to GitHub Releases or any other publisher.
          # darwin binaries are cross-compiled on ubuntu-latest; notarization is
          # gated in .goreleaser.yaml and remains disabled without secrets.
          args: release --snapshot --skip=publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List generated artefacts
        run: ls -lh dist/
