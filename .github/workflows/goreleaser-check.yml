# GoReleaser check and snapshot workflow.
#
# Validates the .goreleaser.yaml configuration on every push and pull request
# that touches release-related files.
#
# A manual workflow_dispatch trigger supports a full snapshot dry-run:
# builds all platforms and generates all artefacts without publishing.
#
# This workflow requires no secrets.

name: GoReleaser Check

on:
  push:
    branches:
      - main
    paths:
      - '.goreleaser.yaml'
      - '.github/workflows/release.yml'
      - '.github/workflows/goreleaser-check.yml'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - '.goreleaser.yaml'
      - '.github/workflows/release.yml'
      - '.github/workflows/goreleaser-check.yml'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Run a full snapshot build (builds artefacts, does not publish)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check:
    name: Validate GoReleaser config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check GoReleaser config
        # goreleaser/goreleaser-action is a third-party action.
        # The action tag (@v6) is pinned to the GoReleaser v2 major line.
        # The GoReleaser tool version below is pinned to a specific release for
        # determinism. Update both pins together when upgrading GoReleaser.
        # Follow-up: pin the action itself to a commit SHA for supply-chain safety.
        # See: https://github.com/goreleaser/goreleaser-action/releases
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.16.0
          args: check

  snapshot:
    name: Snapshot build (dry-run)
    runs-on: ubuntu-latest
    # Only run snapshot when explicitly requested via workflow_dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot == true }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build unsigned darwin placeholder binaries (snapshot only)
        # In production releases, darwin binaries are built, codesigned, and
        # notarised in the sign-darwin job (release.yml) and placed at
        # ./prebuilt/darwin_<arch>/carl before GoReleaser runs. For snapshot
        # dry-runs there is no macOS runner, so build unsigned placeholders so
        # GoReleaser can complete the archive/checksum/Homebrew pipeline.
        # These binaries are never published to a GitHub Release.
        #
        # Note: ldflags (version/commit injection) are intentionally omitted here.
        # Snapshot builds are for pipeline validation only — not for distribution —
        # so the version and commit embedded in these placeholders do not matter.
        run: |
          mkdir -p prebuilt/darwin_amd64 prebuilt/darwin_arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -o prebuilt/darwin_amd64/carl ./cmd/carl
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -o prebuilt/darwin_arm64/carl ./cmd/carl

      - name: GoReleaser snapshot build
        # Keep version pin in sync with the check job above.
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.16.0
          # --snapshot: build without requiring a git tag.
          # --skip=publish: do not upload to GitHub Releases or any other publisher.
          args: release --snapshot --skip=publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List generated artefacts
        run: ls -lh dist/
